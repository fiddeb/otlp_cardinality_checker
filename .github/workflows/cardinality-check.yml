name: Cardinality Check

on:
  push:
    branches: [feature/add-cicd-minimal-mode]

jobs:
  cardinality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build OCC
        run: |
          cd web && npm ci && npm run build && cd ..
          go build -o bin/occ ./cmd/server

      - name: Start OCC in minimal mode
        run: |
          bin/occ --minimal \
            --idle-timeout 15s \
            --report-format text \
            --report-output report.txt \
            --exit-on-threshold &
          echo "OCC_PID=$!" >> "$GITHUB_ENV"
          sleep 2

      - name: Install k6
        run: |
          curl -sSL https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin --strip-components=1 k6-v0.54.0-linux-amd64/k6

      - name: Send telemetry with k6
        run: |
          k6 run --vus 5 --duration 5s \
            -e NUM_MODULES=50 -e CARDINALITY=20 \
            scripts/load-test-metrics.js
          k6 run --vus 5 --duration 5s \
            -e NUM_SPANS=50 -e CARDINALITY=20 \
            scripts/load-test-traces.js

      - name: Wait for OCC idle shutdown
        run: |
          echo "Waiting for OCC to shut down after idle timeout..."
          TIMEOUT=120
          ELAPSED=0
          while kill -0 $OCC_PID 2>/dev/null; do
            sleep 2
            ELAPSED=$((ELAPSED + 2))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Timeout waiting for OCC, killing..."
              kill $OCC_PID 2>/dev/null || true
              break
            fi
          done
          # Get exit code via /proc on Linux
          wait $OCC_PID 2>/dev/null || true
          echo "OCC process finished"

      - name: Show report
        if: always()
        run: cat report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-report
          path: report.txt

      - name: Check thresholds
        run: |
          if [ ! -f report.txt ]; then
            echo "ERROR: report.txt not generated"
            exit 1
          fi
          echo "Report generated successfully"
