name: Cardinality Check

on:
  push:
    branches: [feature/add-cicd-minimal-mode]

jobs:
  cardinality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build OCC
        run: |
          cd web && npm ci && npm run build && cd ..
          go build -o bin/occ ./cmd/server

      - name: Start OCC in minimal mode
        run: |
          bin/occ --minimal \
            --idle-timeout 15s \
            --report-format text \
            --report-output report.txt \
            --exit-on-threshold &
          echo "OCC_PID=$!" >> "$GITHUB_ENV"
          sleep 2

      - name: Send test telemetry
        run: |
          # One metric
          curl -s -X POST http://localhost:4318/v1/metrics -H 'Content-Type: application/json' -d '{
            "resourceMetrics": [{"resource": {"attributes": [{"key": "service.name", "value": {"stringValue": "ci-test"}}]},
              "scopeMetrics": [{"metrics": [{"name": "http_requests_total", "sum": {
                "dataPoints": [{"asInt": "42", "timeUnixNano": "1700000000000000000",
                  "attributes": [{"key": "method", "value": {"stringValue": "GET"}},
                                 {"key": "path", "value": {"stringValue": "/api/users"}},
                                 {"key": "status", "value": {"stringValue": "200"}}]}],
                "isMonotonic": true, "aggregationTemporality": 2}}]}]}]}'

          # One trace
          curl -s -X POST http://localhost:4318/v1/traces -H 'Content-Type: application/json' -d '{
            "resourceSpans": [{"resource": {"attributes": [{"key": "service.name", "value": {"stringValue": "ci-test"}}]},
              "scopeSpans": [{"spans": [{"traceId": "01020304050607080910111213141516",
                "spanId": "0102030405060708", "name": "GET /api/users", "kind": 2,
                "startTimeUnixNano": "1700000000000000000", "endTimeUnixNano": "1700000000050000000",
                "attributes": [{"key": "http.method", "value": {"stringValue": "GET"}},
                               {"key": "http.status_code", "value": {"intValue": "200"}}]}]}]}]}'

          # One log
          curl -s -X POST http://localhost:4318/v1/logs -H 'Content-Type: application/json' -d '{
            "resourceLogs": [{"resource": {"attributes": [{"key": "service.name", "value": {"stringValue": "ci-test"}}]},
              "scopeLogs": [{"logRecords": [{"timeUnixNano": "1700000000000000000",
                "severityText": "INFO", "body": {"stringValue": "User login successful"},
                "attributes": [{"key": "user.role", "value": {"stringValue": "admin"}}]}]}]}]}'

          echo "Telemetry sent: 1 metric, 1 trace, 1 log"

      - name: Wait for OCC idle shutdown
        run: |
          echo "Waiting for OCC to shut down after idle timeout..."
          TIMEOUT=120
          ELAPSED=0
          while kill -0 $OCC_PID 2>/dev/null; do
            sleep 2
            ELAPSED=$((ELAPSED + 2))
            if [ $ELAPSED -ge $TIMEOUT ]; then
              echo "Timeout waiting for OCC, killing..."
              kill $OCC_PID 2>/dev/null || true
              break
            fi
          done
          # Get exit code via /proc on Linux
          wait $OCC_PID 2>/dev/null || true
          echo "OCC process finished"

      - name: Show report
        if: always()
        run: |
          cat report.txt
          echo '### OCC Telemetry Report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-report
          path: report.txt

      - name: Check thresholds
        run: |
          if [ ! -f report.txt ]; then
            echo "ERROR: report.txt not generated"
            exit 1
          fi
          echo "Report generated successfully"
